server {
  listen 8080;
  server_name _;
  resolver __DNS_RESOLVER__ valid=10s ipv6=off;
  set $api_backend "__ARMA3_API_BACKEND__";

  root /usr/share/nginx/html;
  index index.html;

  # Uploads stream directly into the authenticated Arma volume. Its quota is the effective limit.
  client_max_body_size 0;

  # ── SSE (Server-Sent Events) for real-time log streaming ──────────────────
  location /api/logs/stream {
    proxy_pass         http://$api_backend;
    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 86400s;
    proxy_set_header   Connection '';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    add_header         X-Accel-Buffering no;
    chunked_transfer_encoding on;
  }

  location /api/ {
    proxy_pass http://$api_backend;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /auth/ {
    proxy_pass http://$api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /static/ {
    alias /usr/share/nginx/html/;
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
