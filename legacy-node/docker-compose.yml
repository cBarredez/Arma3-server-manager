services:
  arma3:
    build:
      context: .
      dockerfile: Dockerfile
    image: arma3-server:latest
    container_name: arma3-server
    restart: unless-stopped

    environment:
      # ── Steam credentials — required to install/update server and download mods ──
      # AppID 233780 requires owning Arma 3. Anonymous login returns "No subscription".
      STEAM_USER: ${STEAM_USER:-}
      STEAM_PASS: ${STEAM_PASS:-}

      # ── Web Management Panel ──────────────────────────────────────────────────────
      WEB_PORT: ${WEB_PORT:-8080}
      WEB_USERNAME: ${WEB_USERNAME:-admin}
      WEB_PASSWORD: ${WEB_PASSWORD:-changeme123}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_random_secret}

      # ── Arma 3 Server ─────────────────────────────────────────────────────────────
      SERVER_PORT: ${SERVER_PORT:-2302}
      SERVER_NAME: ${SERVER_NAME:-My Arma 3 Server}
      SERVER_PASSWORD: ${SERVER_PASSWORD:-}
      SERVER_PASSWORD_ADMIN: ${SERVER_PASSWORD_ADMIN:-adminpass}
      SERVER_MAX_PLAYERS: ${SERVER_MAX_PLAYERS:-32}

      # ── Paths (auto-detected; override only if your layout is non-standard) ──────
      ARMA3_DIR: /arma3
      # CONFIG_DIR:   /arma3          # default: arma3 root (server.cfg at root)
      # PROFILES_DIR: /arma3/serverprofile
      # MISSIONS_DIR: /arma3/mpmissions
      # STEAMCMD_DIR: /arma3/steamcmd  # auto-detected inside arma3 dir

      TZ: ${TZ:-UTC}

    ports:
      - "${SERVER_PORT:-2302}:2302/udp"    # Game
      - "${SERVER_QUERY_PORT:-2303}:2303/udp" # Browser query
      - "${BATTLEYE_PORT:-2304}:2304/udp"  # BattlEye RCON
      - "${VON_PORT:-2305}:2305/udp"       # VON
      - "${WEB_PORT:-8080}:8080/tcp"       # Web panel

    volumes:
      # For a FRESH install, use the named volume below.
      # For an EXISTING server (like yours), replace it with a bind mount:
      #   - /home/container:/arma3
      # and remove 'arma3-server' from the volumes: block at the bottom.
      - arma3-server:/arma3
      # Persist SteamCMD login cache so Steam Guard is not required after every recreate.
      - steam-home:/home/arma3/Steam
      - steam-config:/home/arma3/.steam


    # Cap resource usage – adjust to your hardware
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-4}"
          memory: ${MEM_LIMIT:-8G}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  arma3-server:
  steam-home:
  steam-config:

