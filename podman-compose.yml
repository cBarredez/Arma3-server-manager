services:
  api:
    build:
      context: .
      dockerfile: Containerfile.api
    image: localhost/arma3-manager-api:latest
    container_name: arma3-api
    restart: unless-stopped
    mem_limit: 14g
    ports:
      - "2302:2302/udp"
      - "2303:2303/udp"
      - "2304:2304/udp"
      - "2305:2305/udp"
    volumes:
      - ./config:/app/config:ro
      - arma3-server:/arma3
      - steam-home:/home/arma3/Steam
      - steam-config:/home/arma3/.steam
      - aspnet-keys:/home/arma3/.aspnet

  frontend:
    build:
      context: .
      dockerfile: Containerfile.frontend
    image: localhost/arma3-manager-frontend:latest
    container_name: arma3-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      ARMA3_API_BASE: ""
      ARMA3_REST_ONLY: "true"
      ARMA3_API_BACKEND: "api:8080"
    ports:
      - "127.0.0.1:8080:8080/tcp"

volumes:
  arma3-server:
  steam-home:
  steam-config:
  aspnet-keys:
