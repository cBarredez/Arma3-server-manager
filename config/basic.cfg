// ─── Arma 3 Basic Network & Performance Configuration ────────────────────────
// Reference: https://community.bistudio.com/wiki/basic.cfg

language     = "English";
adapter      = -1;

// ─── Network ──────────────────────────────────────────────────────────────────
MaxMsgSend          = 128;          // Max messages sent per frame (128 recommended)
MaxSizeGuaranteed   = 512;          // Max guaranteed packet size
MaxSizeNonguaranteed = 256;         // Max non-guaranteed packet size
MinBandwidth        = 131072;       // Min bandwidth (bytes/s) — 128 KB/s
MaxBandwidth        = 104857600;    // Max bandwidth (bytes/s) — 100 MB/s
MinErrorToSend      = 0.001;
MinErrorToSendNear  = 0.01;
MaxCustomFileSize   = 0;            // 0 = no custom face / unit limit

class sockets {
    port = 2302;
};
