# Arma 3 Manager configuration. Secrets belong in manager.secrets.toml.

[web]
# Internal Kestrel port, reachable only from the Podman network.
port = 8080
# Public Nginx port. Both the web UI and /api/* are exposed here.
public_port = 38080
# Listen on every host interface so the panel is reachable over the network.
bind_ip = "0.0.0.0"
username = "admin"
base_url = ""
frontend_origin = ""
public_join_host = ""

[server]
arma3_dir = "/arma3"
steamcmd_dir = "/steamcmd"
port = 2302
query_port = 2303
battleye_port = 2304
von_port = 2305
# BattlEye RCon port, reachable only from within the container (127.0.0.1).
rcon_port = 2306
max_players = 40
memory_limit = "25g"
network_mode = "bridge"

[steam]
user = "anonymous"
owner_ids = []
creator_dlc_app_ids = []

[runtime]
timezone = "UTC"
mock_server = false
mock_steamcmd = false

[history]
# Player/session history retention. IPs and game identifiers are stored locally for this period.
retention_days = 90
